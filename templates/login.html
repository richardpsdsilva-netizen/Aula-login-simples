<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENAI - Login</title>
    <style>
        /* Paleta de cores SENAI */
        :root {
            --senai-blue: #0054a6;
            --senai-red: #ed1c24;
            --senai-gray: #f4f4f4;
            --senai-dark: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--senai-gray);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 380px;
            border-top: 6px solid var(--senai-blue);
        }

        .logo {
            text-align: center;
            font-weight: 900;
            font-size: 28px;
            color: var(--senai-blue);
            margin-bottom: 5px;
        }
        
        .logo span {
            color: var(--senai-red);
        }

        h1 {
            color: var(--senai-dark);
            text-align: center;
            font-size: 22px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--senai-dark);
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--senai-blue);
            box-shadow: 0 0 5px rgba(0, 84, 166, 0.2);
        }

        button {
            width: 100%;
            background-color: var(--senai-blue);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #003d7a;
        }

        .register-link {
            text-align: center;
            margin-top: 25px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        a {
            color: var(--senai-red);
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">SENAI<span>.</span></div>
        <h1>Acesso ao Sistema</h1>

        <form action="/login" method="post">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Sua senha" required>
            </div>

            <button type="submit">ENTRAR</button>
        </form>

        <div class="register-link">
            <a href="/cadastro">Não tem uma conta? Criar conta</a>
        </div>
    </div>

</body>
</html>
